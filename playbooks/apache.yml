---
- name: Deploy Apache Web Server 
  hosts: webservers
  become: true
  tasks: 
    - name: Install httpd
      yum:
        name: httpd
        state: present
    
    - name: Copy Html page
      copy:
        src: /home/ansible/ansible-project/files/index.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0644' 

    - name: Start and Enable the Service
      service: 
        name: httpd
        state: started 
        enabled: true 

    - name: Open Service in Firwall 
      ansible.posix.firewalld: 
        service: http
        state: enabled
        permanent: yes
        immediate: true 
          
    - name: Reload Firewall Serivce 
      service: 
        name: firewalld
        state: reloaded 

